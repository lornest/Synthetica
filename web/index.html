<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthetica - Living Knowledge Garden</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 2rem;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .header p {
            color: #718096;
            margin-top: 0.5rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .input-section {
            display: grid;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        label {
            font-weight: 600;
            color: #4a5568;
        }
        
        input, textarea, select {
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.8);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #718096;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        
        .connections-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .connection-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #667eea;
        }
        
        .connection-nodes {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .connection-details {
            font-size: 0.875rem;
            color: #718096;
        }
        
        .domain-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin: 0 0.25rem;
        }
        
        .strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin: 0.5rem 0;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            transition: width 0.3s ease;
        }
        
        .no-connections {
            text-align: center;
            color: #718096;
            font-style: italic;
            padding: 2rem;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌱 Synthetica</h1>
        <p>A Living Knowledge Garden for Human-AI Collaborative Discovery</p>
    </div>
    
    <div class="container">
        <!-- Input Panel -->
        <div class="panel">
            <h2>Add Knowledge Node</h2>
            <div class="input-section">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" placeholder="Enter a concept or idea...">
                    </div>
                    <div class="form-group">
                        <label for="domain">Domain</label>
                        <select id="domain">
                            <option value="technology">Technology</option>
                            <option value="science">Science</option>
                            <option value="art">Art</option>
                            <option value="philosophy">Philosophy</option>
                            <option value="biology">Biology</option>
                            <option value="mathematics">Mathematics</option>
                            <option value="psychology">Psychology</option>
                            <option value="economics">Economics</option>
                            <option value="general">General</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" placeholder="Describe your idea, concept, or insight..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" placeholder="ai, patterns, connections, innovation...">
                </div>
                
                <button onclick="addKnowledgeNode()">🌱 Plant Knowledge Seed</button>
            </div>
        </div>
        
        <!-- Stats Panel -->
        <div class="panel">
            <h2>Knowledge Garden Stats</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="nodeCount">0</div>
                    <div class="stat-label">Knowledge Nodes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="connectionCount">0</div>
                    <div class="stat-label">Connections</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="crossDomainCount">0</div>
                    <div class="stat-label">Cross-Domain Links</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="domainCount">0</div>
                    <div class="stat-label">Domains</div>
                </div>
            </div>
        </div>
        
        <!-- Connections Panel -->
        <div class="panel">
            <h2>🔗 Cross-Domain Insights Discovered</h2>
            <div class="connections-list" id="connectionsList">
                <div class="no-connections">
                    Add some knowledge nodes to see AI-discovered connections! 🧠✨
                </div>
            </div>
        </div>
    </div>
    
    <script src="demo.js"></script>
    <script>
        // Global knowledge graph instance
        const kg = new SyntheticaKnowledgeGraph();
        
        function addKnowledgeNode() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const domain = document.getElementById('domain').value;
            const tagsText = document.getElementById('tags').value.trim();
            
            if (!title || !content) {
                alert('Please fill in both title and content!');
                return;
            }
            
            const tags = tagsText ? tagsText.split(',').map(t => t.trim()) : [];
            
            // Add the node
            const node = kg.addNode(title, content, domain, tags);
            
            // Clear the form
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('tags').value = '';
            
            // Update the display
            updateStats();
            updateConnections();
            
            // Show success feedback
            showSuccessMessage(`Added "${title}" to the knowledge garden! 🌱`);
        }
        
        function updateStats() {
            const stats = kg.getStats();
            
            document.getElementById('nodeCount').textContent = stats.total_nodes;
            document.getElementById('connectionCount').textContent = stats.total_connections;
            document.getElementById('crossDomainCount').textContent = stats.cross_domain_connections;
            document.getElementById('domainCount').textContent = Object.keys(stats.domains).length;
        }
        
        function updateConnections() {
            const insights = kg.findCrossDomainInsights();
            const connectionsList = document.getElementById('connectionsList');
            
            if (insights.length === 0) {
                connectionsList.innerHTML = '<div class="no-connections">Add more knowledge nodes to discover cross-domain connections! 🧠✨</div>';
                return;
            }
            
            connectionsList.innerHTML = insights.map((insight, index) => {
                const [source, target, connection] = insight;
                
                return `
                    <div class="connection-item">
                        <div class="connection-nodes">
                            ${source.title} <span class="domain-tag">${source.domain}</span>
                            ↔ 
                            ${target.title} <span class="domain-tag">${target.domain}</span>
                        </div>
                        <div class="strength-bar">
                            <div class="strength-fill" style="width: ${connection.strength * 100}%"></div>
                        </div>
                        <div class="connection-details">
                            <strong>Type:</strong> ${connection.connection_type}<br>
                            <strong>Strength:</strong> ${connection.strength.toFixed(2)}<br>
                            <strong>Explanation:</strong> ${connection.explanation}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showSuccessMessage(message) {
            // Simple success notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #48bb78;
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }
        
        // Add some sample data on load
        window.addEventListener('load', () => {
            // Add a few sample nodes to demonstrate the system
            setTimeout(() => {
                kg.addNode(
                    "Neural Networks",
                    "Artificial neural networks are computing systems inspired by biological neural networks",
                    "technology",
                    ["ai", "machine-learning", "computation"]
                );
                
                kg.addNode(
                    "Brain Structure", 
                    "The human brain consists of billions of interconnected neurons",
                    "biology",
                    ["neuroscience", "biology", "cognition", "neurons"]
                );
                
                updateStats();
                updateConnections();
            }, 1000);
        });
        
        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
