<!DOCTYPE html>
<html>
<head>
    <title>D3.js Test</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="test" style="width: 800px; height: 600px; border: 1px solid #ccc;"></div>
    
    <script>
        console.log('D3 version:', d3.version);
        
        const svg = d3.select('#test')
            .append('svg')
            .attr('width', '100%')
            .attr('height', '100%')
            .style('background', '#f0f0f0');
        
        // Add test circle
        svg.append('circle')
            .attr('cx', 100)
            .attr('cy', 100)
            .attr('r', 50)
            .attr('fill', 'blue');
        
        // Add test text
        svg.append('text')
            .attr('x', 200)
            .attr('y', 100)
            .attr('fill', 'red')
            .style('font-size', '20px')
            .text('D3.js is working!');
        
        console.log('SVG created:', svg.node());
    </script>
</body>
</html>
